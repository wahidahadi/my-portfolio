<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate PHP Developer Portfolio</title>

<!-- Fonts & Icons -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<!-- Lightbox CSS -->
<link href="https://cdn.jsdelivr.net/npm/lightbox2@2.11.4/dist/css/lightbox.min.css" rel="stylesheet">

<!-- Swiper CSS -->
<link href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" rel="stylesheet">

<!-- Typed.js -->
<script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>

<!-- ScrollReveal -->
<script src="https://unpkg.com/scrollreveal"></script>

<style>
/* ---------- Preloader ---------- */
#preloader{ position:fixed; top:0; left:0; width:100%; height:100%; background:#0d6efd; display:flex; justify-content:center; align-items:center; z-index:2000; }
#preloader .spinner{ width:80px; height:80px; border:8px solid #fff; border-top:8px solid #ffeb3b; border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}

/* ---------- Base ---------- */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Roboto',sans-serif;scroll-behavior:smooth;background:#f8f9fa;color:#333;}
a{text-decoration:none;}

/* ---------- Navbar ---------- */
.navbar{position:fixed;top:0;left:0;width:100%;background:#0d6efd;padding:15px 20px;z-index:1000;display:flex;justify-content:space-between;align-items:center;}
.navbar .logo{color:white;font-weight:bold;font-size:22px;}
.navbar ul{list-style:none;display:flex;gap:20px;}
.navbar ul li a{color:white;font-weight:500;transition:0.3s;}
.navbar ul li a.active, .navbar ul li a:hover{color:#ffeb3b;}
.navbar .menu-toggle{display:none;font-size:25px;color:white;cursor:pointer;}

/* ---------- Hero ---------- */
.hero{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:linear-gradient(-45deg,#0d6efd,#6610f2,#6f42c1,#0dcaf0);background-size:400% 400%;animation:gradientBG 15s ease infinite;color:white;opacity:0;transform:translateY(50px);transition:1s;}
.hero h1{font-size:50px;font-weight:bold;}
.hero p{font-size:22px;margin-top:15px;}
.hero .cta-buttons{margin-top:25px; display:flex; gap:20px;}
.hero .cta-buttons a{padding:12px 25px;border-radius:5px;background:#ffeb3b;color:#0d6efd;font-weight:bold;transition:0.3s;}
.hero .cta-buttons a:hover{background:#ffc107; color:#0a3b70;}

/* ---------- Sections ---------- */
.section{padding:80px 20px;opacity:0;transform:translateY(50px);transition:1s;}
.text-center{text-align:center;}

/* ---------- Skills ---------- */
#skills .skills-container{display:flex;flex-wrap:wrap;justify-content:center;gap:40px;}
.skill{text-align:center;}
.skill i{font-size:40px;color:#0d6efd;margin-bottom:10px;transition:0.3s;}
.skill:hover i{transform:scale(1.2);}
.skill-progress{width:150px;height:150px;position:relative;margin:0 auto;}
.skill-progress svg{transform:rotate(-90deg);width:100%;height:100%;}
.skill-progress circle{fill:none;stroke:#ddd;stroke-width:10;}
.skill-progress circle.progress{stroke:#0d6efd;stroke-linecap:round;stroke-dasharray:440;stroke-dashoffset:440;transition:1s;}
.skill-progress span{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-weight:bold;}

/* ---------- Projects ---------- */
#projects .projects-container{display:flex;flex-wrap:wrap;gap:30px;justify-content:center;}
.project-card{background:white;padding:20px;border-radius:10px;width:300px;box-shadow:0 5px 15px rgba(0,0,0,0.1);transition:0.3s;text-align:center;opacity:0;transform:translateY(50px);}
.project-card:hover{transform:translateY(-10px);box-shadow:0 10px 25px rgba(0,0,0,0.2);}
.project-card img{width:100%;border-radius:10px;margin-bottom:10px;}

/* ---------- Testimonials ---------- */
#testimonials .swiper{max-width:600px;margin:0 auto;opacity:0;transform:translateY(50px);}
#testimonials .swiper-slide{background:white;padding:30px;border-radius:10px;text-align:center;box-shadow:0 5px 15px rgba(0,0,0,0.1);}
#testimonials .swiper-slide p{font-style:italic;margin-bottom:10px;}

/* ---------- Contact ---------- */
#contact form{max-width:600px;margin:0 auto;display:flex;flex-direction:column;gap:15px;opacity:0;transform:translateY(50px);}
#contact input,#contact textarea{padding:12px;border-radius:5px;border:1px solid #ccc;font-size:16px;}
#contact button{padding:12px;border:none;background:#0d6efd;color:white;font-size:18px;border-radius:5px;cursor:pointer;transition:0.3s;}
#contact button:hover{background:#094aac;}

/* ---------- Footer ---------- */
.footer{background:#111;color:white;text-align:center;padding:25px 0;}
.footer a{color:#ffeb3b;margin:0 10px;}
.footer a:hover{text-decoration:underline;}

/* ---------- Animations ---------- */
@keyframes gradientBG{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

/* ---------- Responsive ---------- */
@media(max-width:768px){
    .navbar ul{flex-direction:column;background:#0d6efd;position:absolute;top:60px;right:-100%;width:100%;transition:0.3s;}
    .navbar ul.show{right:0;}
    .navbar .menu-toggle{display:block;}
}
</style>
</head>
<body>

<!-- Preloader -->
<div id="preloader"><div class="spinner"></div></div>

<!-- Navbar -->
<nav class="navbar">
    <a href="#" class="logo">PHP Portfolio</a>
    <span class="menu-toggle"><i class="fa fa-bars"></i></span>
    <ul>
        <li><a href="#about">About</a></li>
        <li><a href="#skills">Skills</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#testimonials">Testimonials</a></li>
        <li><a href="#contact">Contact</a></li>
    </ul>
</nav>

<!-- Hero Section -->
<section class="hero">
    <h1>Hi, I'm a <span id="typed"></span></h1>
    <p>Building modern web applications and dashboards</p>
    <div class="cta-buttons">
        <a href="mailto:youremail@example.com">Hire Me</a>
        <a href="https://www.fiverr.com/yourusername" target="_blank">View Fiverr Profile</a>
        <a href="resume.pdf" download>Download Resume PDF</a>
    </div>
</section>

<!-- About, Skills, Projects, Testimonials, Contact Sections (همانند نسخه قبلی) -->
<!-- ... می‌توانید همان کدهای قبلی را اینجا قرار دهید ... -->

<!-- Footer -->
<footer class="footer">
<p>© 2026 Ultimate PHP Developer Portfolio | 
<a href="#" target="_blank"><i class="fab fa-linkedin"></i> LinkedIn</a> | 
<a href="#" target="_blank"><i class="fab fa-github"></i> GitHub</a> | 
<a href="https://www.fiverr.com/yourusername" target="_blank"><i class="fas fa-handshake"></i> Fiverr</a></p>
</footer>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lightbox2@2.11.4/dist/js/lightbox.min.js"></script>
<script>
// Preloader
window.addEventListener('load', ()=>{ document.getElementById('preloader').style.display='none'; });

// Typed.js Hero Text
var typed = new Typed('#typed', { strings: ["PHP Developer","Full-Stack Developer","Web Application Expert"], typeSpeed:60, backSpeed:40, loop:true });

// Navbar toggle for mobile
const menuToggle = document.querySelector('.menu-toggle');
const navUl = document.querySelector('.navbar ul');
menuToggle.addEventListener('click', () => { navUl.classList.toggle('show'); });

// Smooth scroll and scroll spy
document.querySelectorAll('.navbar a').forEach(anchor=>{
    anchor.addEventListener('click', function(e){
        e.preventDefault();
        document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior:'smooth' });
        navUl.querySelectorAll('a').forEach(a=>a.classList.remove('active'));
        this.classList.add('active');
        if(navUl.classList.contains('show')) navUl.classList.remove('show');
    });
});

// Skill Progress Animation
window.addEventListener('scroll', () => {
    const skills = document.querySelectorAll('.skill .progress');
    skills.forEach(skill => {
        const rect = skill.getBoundingClientRect();
        if(rect.top < window.innerHeight){
            const percent = skill.parentElement.querySelector('span').innerText.replace(/\D/g,'');
            skill.style.strokeDashoffset = 440 - (440 * percent/100);
        }
    });
});

// Initialize Swiper
var swiper = new Swiper('.swiper', { loop:true, autoplay:{ delay:4000 }, pagination:{ el:'.swiper-pagination', clickable:true } });

// ScrollReveal animations
ScrollReveal().reveal('.hero',{ duration:1000, origin:'bottom', distance:'50px', opacity:0.2, delay:200 });
ScrollReveal().reveal('.section',{ duration:1000, origin:'bottom', distance:'50px', opacity:0.2, interval:200 });
ScrollReveal().reveal('.project-card',{ duration:1000, origin:'bottom', distance:'50px', opacity:0.2, interval:200 });
ScrollReveal().reveal('#contact form',{ duration:1000, origin:'bottom', distance:'50px', opacity:0.2 });
</script>
</body>
</html>
